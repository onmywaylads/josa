<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>바로고 북부광역사업부</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script>
      window.kakaoMapReady = false;
      function loadKakaoMap() {
        const script = document.createElement('script');
        script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=609abf3a790dfc40f87487e053dddfe8&libraries=services&autoload=false';
        script.onload = function() {
          kakao.maps.load(function() {
            window.kakaoMapReady = true;
            if (window._onKakaoReady) window._onKakaoReady();
          });
        };
        document.head.appendChild(script);
      }
      loadKakaoMap();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
